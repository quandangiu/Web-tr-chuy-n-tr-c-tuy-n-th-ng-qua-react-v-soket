version: '3.8'

services:
  # Client React app
  client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    container_name: chat-realtime-client
    restart: unless-stopped

  # Optional: Nếu có backend, uncomment phần này
